    document.body.addEventListener('keydown', (event) => {

      if(event.key === 'a'){

      }else if(event.key === 'Backspace'){
        showMessage();

    function showMessage(){
         document.querySelector('.js-message').innerHTML = 'Are you sure you want to reset the score? <button class="js-yes">Yes</button> <button class="js-no">No</button>';

      document.querySelector('.js-yes').addEventListener('click',() => {

        resetScore();
        hiddenResultMessage();

      });


      document.querySelector('.js-no').addEventListener('click',() => {

        hiddenResultMessage();

      });
      

    }

    function hiddenResultMessage(){

      document.querySelector('.js-message').innerHTML = '';

    }



    function resetScore(){

      score.wins = 0;
      score.loses = 0;
      score.tie = 0;
      localStorage.removeItem('score');
      updateScoreElement();

    }


    let isPlay = false;
    let intervalId;

    function autoplay(){
      
      
      if(!isPlay){
        
        intervalId = setInterval(() => {
          const playerMove = pickComputerMove();

          getResult(playerMove);

      },1000);
      isPlay = true;
      document.querySelector('.js-autoplay').innerHTML = 'Stop Playing';

      }else{

        clearInterval(intervalId);
        isPlay = false;        
        document.querySelector('.js-autoplay').innerHTML = 'Auto Play';
        

      }
     
    }


    function pickComputerMove(){

      const ranNumber = Math.random();
      let move = '';

      if(ranNumber < 1/3){
        move = 'Rock';
      }else if(1/3 < ranNumber && ranNumber < 2/3){
        move = 'Paper';
      }else{
        move = 'Scissors';
      }

      return move;

    }

    let score = JSON.parse(localStorage.getItem ('score')) || {
      wins: 0,
      loses: 0,
      tie: 0
    
    };
    updateScoreElement();

    function getResult(playerMove){

       let move = pickComputerMove();
       let result = '';

      if(playerMove === 'Rock'){

        if(move === 'Rock'){
          result = 'Tie';
        }else if(move === 'Paper'){
          result = 'you lose';
        }else{
          result = 'you win';
        }
      }else if(playerMove === 'Paper'){

        if(move === 'Rock'){
        result = 'you win';
        }else if(move === 'Paper'){
          result = 'Tie';
        }else{
          result = 'you lose';
        }
      }else{
        if(move === 'Rock'){
        result = 'you lose';
        }else if(move === 'Paper'){
          result = 'you win';
        }else{
          result = 'Tie';
        }
      }

      if(result === 'you win'){
        score.wins +=1;
      }else if(result === 'you lose'){
        score.loses +=1;
      }else if(result === 'Tie'){
        score.tie +=1;
      }

      localStorage.setItem('score',JSON.stringify(score));

      updateScoreElement();

      document.querySelector('.js-result').innerHTML = `${result}`;

      document.querySelector(`.js-move`).innerHTML = `you ${playerMove} - ${move} computer`;
      
//       alert(`you Picked ${playerMove} Computer Picked ${move} ${result}
//  wins:${score.wins} loses:${score.loses} ties:${score.tie}`);


    }

    function updateScoreElement(){

      document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.loses} Ties: ${score.tie}`
