     const todoList = JSON.parse(localStorage.getItem('todoList')) || [];

     renderTodo();

     function renderTodo(){

       let todoListHtml = '';

       for(let i=0; i<todoList.length; i++){

        const todoObject = todoList[i];

        // const name = todoList.name;
        // const date = todoList.date;
        //instaed of this we can use object destructuring

        const {name, date} = todoObject;

        const html = `<p>
          ${name} ${date}
          <button onclick="

          todoList.splice(${i}, 1);

          renderTodo();
          saveToStorage();
      
          ">delete</button>
          
          </p>`;

          todoListHtml +=html;

      }
      document.querySelector('.js-show-result').innerHTML = todoListHtml;

      
     }

     function addTodo(){

       const inputElement = document.querySelector('.js-input');
       const dateInputElement = document.querySelector('.js-date-input');

       const name = inputElement.value;
       const date = dateInputElement.value;

       todoList.push({
        // name : name,
        // date : date
        //can be do this in shorthand property way since name and the value are same
        name,
        date
       });

       renderTodo();
       saveToStorage();

       inputElement.value = '';


     }

     function saveToStorage(){

      localStorage.setItem('todoList',JSON.stringify(todoList));

     }
