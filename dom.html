      function pickComputerMove(){

      const ranNumber = Math.random();
      let move = '';

      if(ranNumber < 1/3){
        move = 'Rock';
      }else if(1/3 < ranNumber && ranNumber < 2/3){
        move = 'Paper';
      }else{
        move = 'Scissors';
      }

      return move;

    }

    let score = JSON.parse(localStorage.getItem ('score')) || {
      wins: 0,
      loses: 0,
      tie: 0
    
    };
    updateScoreElement();

    function getResult(playerMove){

       let move = pickComputerMove();
       let result = '';

      if(playerMove === 'Rock'){

        if(move === 'Rock'){
          result = 'Tie';
        }else if(move === 'Paper'){
          result = 'you lose';
        }else{
          result = 'you win';
        }
      }else if(playerMove === 'Paper'){

        if(move === 'Rock'){
        result = 'you win';
        }else if(move === 'Paper'){
          result = 'Tie';
        }else{
          result = 'you lose';
        }
      }else{
        if(move === 'Rock'){
        result = 'you lose';
        }else if(move === 'Paper'){
          result = 'you win';
        }else{
          result = 'Tie';
        }
      }

      if(result === 'you win'){
        score.wins +=1;
      }else if(result === 'you lose'){
        score.loses +=1;
      }else if(result === 'Tie'){
        score.tie +=1;
      }

      localStorage.setItem('score',JSON.stringify(score));

      updateScoreElement();

      document.querySelector('.js-result').innerHTML = `${result}`;

      document.querySelector(`.js-move`).innerHTML = `you ${playerMove} - ${move} computer`;
      
      alert(`you Picked ${playerMove} Computer Picked ${move} ${result}
 wins:${score.wins} loses:${score.loses} ties:${score.tie}`);


    }

    function updateScoreElement(){

      document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.loses} Ties: ${score.tie}`
